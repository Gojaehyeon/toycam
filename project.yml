name: ToyCam
options:
  bundleIdPrefix: com.toycam
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: ko
fileGroups:
  - ToyCam.storekit
schemes:
  ToyCam:
    build:
      targets:
        ToyCam: all
    run:
      config: Debug
      storeKitConfiguration: ToyCam.storekit
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1"              # iPhone 전용
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
targets:
  ToyCam:
    type: application
    platform: iOS
    sources:
      - path: ToyCam
        excludes:
          - "AppIcon.icon"
      - path: ToyCam/AppIcon.icon
        buildPhase: resources
        type: file
    settings:
      base:
        INFOPLIST_FILE: ToyCam/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.toycam.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"              # iPhone 전용 (타깃 레벨에서 강제)
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
