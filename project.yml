name: ToyCam
options:
  bundleIdPrefix: com.toycam
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1"
targets:
  ToyCam:
    type: application
    platform: iOS
    sources:
      - path: ToyCam
    settings:
      base:
        INFOPLIST_FILE: ToyCam/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.toycam.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
